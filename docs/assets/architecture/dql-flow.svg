<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="920" viewBox="0 0 1800 920" role="img" aria-labelledby="title desc">
  <title id="title">DQL 10-second architecture flow</title>
  <desc id="desc">A clear flow from dbt and optional DataLex context into certified DQL blocks, then into apps, notebooks, agents, and CI.</desc>
  <defs>
    <style>
      .bg { fill: #fbfaf7; }
      .title { fill: #111827; font: 700 46px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .subtitle { fill: #475569; font: 400 24px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .label { fill: #64748b; font: 700 17px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; letter-spacing: 1.4px; }
      .card { stroke-width: 3; rx: 24; }
      .source { fill: #fff7ed; stroke: #d97706; }
      .contract { fill: #eef2ff; stroke: #4f46e5; }
      .dql { fill: #ecfdf5; stroke: #059669; }
      .draft { fill: #fffbeb; stroke: #f59e0b; }
      .gate { fill: #f8fafc; stroke: #64748b; }
      .num { fill: #111827; font: 800 24px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .cardTitle { fill: #111827; font: 700 25px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .cardText { fill: #334155; font: 400 20px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .noteStrong { fill: #111827; font: 700 22px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .note { fill: #334155; font: 500 22px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .arrow { stroke: #64748b; stroke-width: 4; fill: none; marker-end: url(#arrowhead); }
      .dash { stroke-dasharray: 10 10; }
    </style>
    <marker id="arrowhead" markerWidth="14" markerHeight="14" refX="10" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#64748b"/>
    </marker>
  </defs>

  <rect class="bg" width="1800" height="920"/>
  <text x="80" y="86" class="title">DQL: certified analytics files for dashboards, notebooks and agents</text>
  <text x="80" y="128" class="subtitle">Read left to right. DQL imports context, certifies reusable blocks, then serves the same trusted assets everywhere.</text>

  <text x="104" y="210" class="label">INPUTS</text>
  <text x="528" y="210" class="label">DQL CORE</text>
  <text x="1198" y="210" class="label">CONSUMPTION</text>

  <rect x="80" y="250" width="310" height="150" class="card source"/>
  <circle cx="122" cy="292" r="26" fill="#fed7aa"/>
  <text x="114" y="301" class="num">1</text>
  <text x="122" y="344" class="cardTitle">dbt project</text>
  <text x="122" y="382" class="cardText">models, metrics, lineage</text>

  <rect x="80" y="464" width="310" height="150" class="card contract"/>
  <circle cx="122" cy="506" r="26" fill="#c7d2fe"/>
  <text x="114" y="515" class="num">2</text>
  <text x="122" y="558" class="cardTitle">DataLex manifest</text>
  <text x="122" y="596" class="cardText">optional certified contracts</text>

  <rect x="496" y="250" width="310" height="150" class="card dql"/>
  <circle cx="538" cy="292" r="26" fill="#bbf7d0"/>
  <text x="530" y="301" class="num">3</text>
  <text x="538" y="344" class="cardTitle">Sync context</text>
  <text x="538" y="382" class="cardText">import dbt and warehouse shape</text>

  <rect x="496" y="464" width="310" height="150" class="card dql"/>
  <circle cx="538" cy="506" r="26" fill="#bbf7d0"/>
  <text x="530" y="515" class="num">4</text>
  <text x="538" y="558" class="cardTitle">Certified blocks</text>
  <text x="538" y="596" class="cardText">SQL, owner, tests, AI context</text>

  <rect x="898" y="356" width="310" height="150" class="card dql"/>
  <circle cx="940" cy="398" r="26" fill="#bbf7d0"/>
  <text x="932" y="407" class="num">5</text>
  <text x="940" y="450" class="cardTitle">DQL manifest</text>
  <text x="940" y="488" class="cardText">lineage and trust graph</text>

  <path class="arrow" d="M390 325 L496 325"/>
  <path class="arrow" d="M390 539 L496 539"/>
  <path class="arrow" d="M651 400 L651 464"/>
  <path class="arrow" d="M806 539 L898 431"/>

  <line x1="1208" y1="431" x2="1270" y2="431" stroke="#64748b" stroke-width="4"/>
  <path class="arrow" d="M1270 431 L1270 284 L1350 284"/>
  <path class="arrow" d="M1270 431 L1350 431"/>
  <path class="arrow" d="M1270 431 L1270 578 L1350 578"/>
  <path class="arrow" d="M1270 431 L1270 724 L1350 724"/>

  <rect x="1350" y="220" width="330" height="128" class="card dql"/>
  <text x="1388" y="272" class="cardTitle">Apps</text>
  <text x="1388" y="312" class="cardText">stakeholder dashboards</text>

  <rect x="1350" y="367" width="330" height="128" class="card dql"/>
  <text x="1388" y="419" class="cardTitle">Notebooks</text>
  <text x="1388" y="459" class="cardText">research and promotion</text>

  <rect x="1350" y="514" width="330" height="128" class="card dql"/>
  <text x="1388" y="566" class="cardTitle">Agent and MCP</text>
  <text x="1388" y="606" class="cardText">certified answers first</text>

  <rect x="1350" y="661" width="330" height="128" class="card gate"/>
  <text x="1388" y="713" class="cardTitle">CI verify</text>
  <text x="1388" y="753" class="cardText">drift and trust gates</text>

  <rect x="496" y="704" width="310" height="112" class="card draft"/>
  <text x="538" y="754" class="cardTitle">Review-required drafts</text>
  <text x="538" y="790" class="cardText">AI SQL stays labeled</text>
  <path class="arrow dash" d="M651 704 L651 614"/>

  <rect x="80" y="844" width="1620" height="52" rx="22" fill="#ffffff" stroke="#e2e8f0" stroke-width="2"/>
  <text x="118" y="878" class="noteStrong">10-second takeaway:</text>
  <text x="338" y="878" class="note">DQL makes one reviewed answer layer power Apps, notebooks, agents and CI instead of letting every surface invent its own SQL.</text>
</svg>
