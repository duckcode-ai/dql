metrics:
  - name: card_volume
    label: Card Volume
    description: Total card transaction volume in USD.
    type: sum
    sql: amount_usd
    table: transactions
    domain: cards
    tags: [cards, volume]

  - name: fraud_exposure
    label: Fraud Exposure
    description: Total fraud alert exposure in USD.
    type: sum
    sql: amount_usd
    table: fraud_alerts
    domain: cards
    tags: [fraud, risk]

  - name: deposit_balance
    label: Deposit Balance
    description: Total customer deposit balance.
    type: sum
    sql: balance_usd
    table: deposits
    domain: deposits
    tags: [deposits, balance]

  - name: loan_outstanding
    label: Loan Outstanding
    description: Total outstanding loan balance.
    type: sum
    sql: outstanding_usd
    table: loans
    domain: lending
    tags: [lending, exposure]

