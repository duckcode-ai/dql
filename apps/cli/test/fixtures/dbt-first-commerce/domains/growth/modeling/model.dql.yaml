entities:
  - id: acquisition
    dbt_model: model.dbt_first_commerce.dim_customer_acquisition
  - id: campaign_touch
    dbt_model: model.dbt_first_commerce.fct_campaign_touches
relationships:
  - id: acquisition_to_customer
    owner_domain: growth
    from: acquisition
    to: customer
    keys: [{ from: customer_id, to: customer_id }]
    cardinality: many_to_one
    fanout: safe
    crossDomain: true
    imports: [commerce.customer_identity@1]
    status: certified
    owner: growth@company.test
    certifiedAgainst:
      from: { grain: customer_id, keys: [customer_id] }
      to: { grain: customer_id, keys: [customer_id] }
    validation:
      status: passed
      checked_at: "2026-07-11T00:00:00.000Z"
      query_fingerprint: fixture-acquisition-customer-proof
      from_rows: 5
      to_rows: 5
      joined_rows: 5
      from_null_keys: 0
      to_null_keys: 0
      unmatched_from: 0
      max_from_per_key: 1
      max_to_per_key: 1
  - id: touch_to_order_attribution
    owner_domain: growth
    from: campaign_touch
    to: order
    keys: [{ from: customer_id, to: customer_id }]
    cardinality: many_to_many
    fanout: attribution_required
    imports: [commerce.order_analytics@1]
    status: draft
    owner: growth@company.test
imports:
  - id: growth_customer_identity
    export: commerce.customer_identity@1
    purpose: growth_attribution
    status: certified
    owner: growth@company.test
  - id: growth_order_analytics
    export: commerce.order_analytics@1
    purpose: growth_attribution
    status: certified
    owner: growth@company.test
