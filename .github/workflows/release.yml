name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      publish_extension:
        description: Publish the VS Code extension to the Visual Studio Marketplace
        type: boolean
        required: false
        default: false

concurrency:
  group: dql-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish-packages:
    if: github.repository == 'duckcode-ai/dql' && secrets.NPM_TOKEN != ''
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          registry-url: https://registry.npmjs.org
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: pnpm test
      - run: pnpm release:publish

  package-extension:
    if: github.repository == 'duckcode-ai/dql'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      VSCE_PAT: ${{ secrets.VSCE_PAT }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter dql-language-support build
      - run: pnpm --filter dql-language-support package
      - uses: actions/upload-artifact@v4
        with:
          name: dql-language-support-vsix
          path: apps/vscode-extension/*.vsix
      - if: ${{ env.VSCE_PAT != '' && (startsWith(github.ref, 'refs/tags/v') || inputs.publish_extension == true) }}
        run: pnpm --filter dql-language-support publish:vsce
