name: Class-B execution match (credentialed)

# Wrong-NUMBER regression gate: seeds a real warehouse from the committed dataset
# and runs the class-B (fan-out / wrong-grain) eval with --min-execution-match 1.
# This needs an LLM to generate the SQL that then executes, so — like the judged
# eval — it runs on a schedule / manual dispatch only and never blocks a PR.
#
# The OFFLINE guarantee is already a required PR gate: the standard test suite
# runs packages/dql-agent/src/testkit/class-b-ground-truth.test.ts, which proves
# the seed data + expected rows with a real SQL engine on every PR. This workflow
# adds the end-to-end LLM path on top.
on:
  workflow_dispatch:
  schedule:
    # Weekly, Monday 06:30 UTC (after the judged eval).
    - cron: '30 6 * * 1'

jobs:
  classb-execution:
    name: class-B execution match (seed + execute)
    runs-on: ubuntu-latest
    if: ${{ github.repository == 'duckcode-ai/dql' }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - name: Guard — require an API key
        id: guard
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          if [ -z "$OPENAI_API_KEY" ] && [ -z "$ANTHROPIC_API_KEY" ]; then
            echo "No model API key configured; skipping class-B execution eval." >&2
            echo "run=false" >> "$GITHUB_OUTPUT"
          else
            echo "run=true" >> "$GITHUB_OUTPUT"
          fi
      - name: Prepare seeded project (DuckDB)
        if: steps.guard.outputs.run == 'true'
        run: |
          # duckdb is an optional dependency; install it ad-hoc for the seed step.
          npm install --no-save duckdb
          PROJ="$RUNNER_TEMP/classb-proj"
          cp -r apps/cli/test/fixtures/jaffle-supply-chain "$PROJ"
          node scripts/seed-eval-warehouse.mjs --out "$PROJ/jaffle.duckdb"
          # Point the ephemeral runtime's connection at the seeded DuckDB file.
          node -e "const fs=require('fs');const p=process.env.PROJ+'/dql.config.json';const c=JSON.parse(fs.readFileSync(p,'utf8'));c.defaultConnection={driver:'duckdb',filepath:process.env.PROJ+'/jaffle.duckdb'};fs.writeFileSync(p,JSON.stringify(c,null,2));"
        env:
          PROJ: ${{ runner.temp }}/classb-proj
      - name: dql agent eval --execute (class-B, min-execution-match 1)
        if: steps.guard.outputs.run == 'true'
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          PROJ: ${{ runner.temp }}/classb-proj
        run: |
          node apps/cli/dist/index.js agent eval "$PROJ/agent-evals/class-b-semantic.agent-evals.yml" \
            --execute --format json \
            --min-execution-match 1 --max-wrong-certified 0 > classb-report.json
          cat classb-report.json
      - name: Upload class-B report
        if: steps.guard.outputs.run == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: classb-execution-report
          path: classb-report.json
          if-no-files-found: ignore
