# Convenience compose file for running DQL in a container.
#
#   docker compose up                 # notebook on http://127.0.0.1:3474
#   docker compose --profile slack up # also start the Slack bot on :3479
#   docker compose --profile ollama up# also start an Ollama daemon on :11434
#
# All ports are mapped to 127.0.0.1 on the host, so the security posture
# matches the native `dql notebook` (loopback-only).
#
# The `./` mount at /workspace lets this compose file serve either a real DQL
# project (when dql.config.json is present) or this framework repo. In the
# framework repo case, the container creates an ignored Acme Bank starter under
# .dql/docker-starter/acme-bank and opens that project automatically.

services:
  notebook:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: dql-notebook
    ports:
      - "127.0.0.1:3474:3474"
    volumes:
      - ./:/workspace
    environment:
      DQL_HOST: 0.0.0.0
      # Optional credentials. Empty values keep Docker startup smooth; the UI
      # Settings page shows what is configured and provider calls return clear
      # setup errors when a selected provider is missing credentials.
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_MODEL: ${GEMINI_MODEL:-}
      # Default reaches a host-local Ollama daemon from Docker Desktop. If you
      # use the Compose ollama profile, the provider also falls back to
      # http://ollama:11434 automatically.
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-llama3.1}
      DQL_SLACK_WEBHOOK: ${DQL_SLACK_WEBHOOK:-}
      DQL_SMTP_URL: ${DQL_SMTP_URL:-}
      DQL_SMTP_FROM: ${DQL_SMTP_FROM:-}
    command: ["dql", "notebook", "--host", "0.0.0.0", "--no-open"]

  slack:
    profiles: [slack]
    build:
      context: .
      dockerfile: Dockerfile
    container_name: dql-slack
    ports:
      - "127.0.0.1:3479:3479"
    volumes:
      - ./:/workspace
    environment:
      SLACK_SIGNING_SECRET: ${SLACK_SIGNING_SECRET:-}
      SLACK_BOT_TOKEN: ${SLACK_BOT_TOKEN:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_MODEL: ${GEMINI_MODEL:-}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://ollama:11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-llama3.1}
    command: ["dql", "slack", "serve", "--port", "3479"]

  ollama:
    profiles: [ollama]
    image: ollama/ollama:latest
    container_name: dql-ollama
    ports:
      - "127.0.0.1:11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    # First run will be slow — the base model has to download.
    command: ["serve"]

volumes:
  ollama-data:
