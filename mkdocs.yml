site_name: DQL
site_description: Analytics-as-code with certified blocks, AI-grade lineage, and an MCP server for AI agents.
site_url: https://dql.duckcode.ai
repo_url: https://github.com/duckcode-ai/dql
repo_name: duckcode-ai/dql
edit_uri: edit/main/docs/

theme:
  name: material
  language: en
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.indexes
    - navigation.top
    - navigation.footer
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy
    - content.code.annotate
    - content.action.edit
    - content.tabs.link
    - toc.follow
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: green
      accent: green
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: green
      accent: green
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.snippets

plugins:
  - search

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/duckcode-ai/dql
    - icon: fontawesome/brands/discord
      link: https://discord.gg/Dnm6bUvk

# Internal artifacts kept out of the published site.
exclude_docs: |
  oss-readiness-checklist.md
  rfcs/0000-template.md
  contribute/

