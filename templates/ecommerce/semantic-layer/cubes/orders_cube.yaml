# Multi-table cube with joins — demonstrates cross-table semantic queries.
# This cube joins orders with customers to enable queries like:
#   "total GMV by customer health_score and region"

name: orders
label: Orders Cube
description: E-commerce orders cube with customer join.
table: orders
domain: commerce

measures:
  - name: gmv
    label: Gross Merchandise Value
    sql: SUM(order_total)
    type: sum
  - name: order_count
    label: Order Count
    sql: COUNT(order_id)
    type: count
  - name: avg_order_value
    label: Average Order Value
    sql: AVG(order_total)
    type: avg
  - name: avg_margin
    label: Average Margin
    sql: AVG(gross_margin)
    type: avg

dimensions:
  - name: segment
    label: Segment
    sql: segment
    type: string
  - name: channel
    label: Channel
    sql: channel
    type: string
  - name: region
    label: Region
    sql: region
    type: string
  - name: payment_method
    label: Payment Method
    sql: payment_method
    type: string
  - name: is_repeat
    label: Repeat Customer
    sql: is_repeat
    type: boolean

time_dimensions:
  - name: order_date
    label: Order Date
    sql: order_date
    primary_time: true
    granularities:
      - day
      - week
      - month
      - quarter
      - year

joins:
  - name: customers
    type: left
    sql: "${left}.customer_id = ${right}.customer_id"

tags:
  - commerce
  - ecommerce
